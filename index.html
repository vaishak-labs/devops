<!DOCTYPE html>
<html>
<head>
    <title>AWS EC2 Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            text-align: center;
            margin-top: 100px;
        }

        .card {
            background: white;
            width: 400px;
            margin: auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        button {
            background: #0078D4;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            cursor: pointer;
        }

        h1 {
            color: #333;
        }

        p {
            color: #666;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>🚀 AWS EC2 Demo</h1>
    <p>This website is hosted on an Amazon Linux EC2 Instance.</p>

    <button onclick="showMessage()">Click Me</button>

    <p id="demo"></p>
</div>

<script>
function showMessage() {
    document.getElementById("demo").innerHTML =
    "✅ Congratulations! Your web app is running successfully on AWS EC2.";
}
</script>

</body>
</html>
